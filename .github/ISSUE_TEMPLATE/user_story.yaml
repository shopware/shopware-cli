name: Story
description: Use this template to draft a user story.
type: Story

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to share your idea!
        Please check the existing issues to ensure this has not already been suggested.

  - type: textarea
    id: user-story
    attributes:
      label: User story
      description: |
        Please describe your request using the following format:

        As a [user persona],
        I would like to [goal],
        so that I can [benefit].
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: |
        Define at least one measurable condition, observable behavior,
        or success indicator that helps validate completion.
    validations:
      required: true

  - type: checkboxes
    id: readiness
    attributes:
      label: Readiness checklist
      description: Please confirm the following considerations.
      options:
        - label: Acceptance criteria are clearly defined.
        - label: Backward compatibility impact addressed.
        - label: Documentation written.
        - label: Tests added or adjusted accordingly.
    validations:
      required: false