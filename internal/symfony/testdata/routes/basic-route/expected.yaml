# yaml-language-server: $schema=https://raw.githubusercontent.com/symfony/routing/7.4/Loader/schema/routing.schema.json
frontend.example:
    path: /example/{page}
    controller: Shop\Storefront\Controller\ExampleController::index
    schemes: [https]
    methods: [GET, POST]
    defaults:
        page: "1"
    requirements:
        page: \d+
    options:
        seo: false
    condition: context.getMethod() in ['GET']
